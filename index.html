  // DOM Manipulation

  function addContentToElement(textContent, contentType, parentNode) {
    acceptedContentTypes = [
      "div",
    ]
    if (
      typeof textContent === "string"
      && typeof contentType === "string"
      && acceptedContentTypes.includes(contentType)
      && textContent.length > 0
      && contentType.length > 0
      && parentNode.ELEMENT_NODE === 1
    ) {
      const newElement = document.createElement(contentType);
      const textNode = document.createTextNode(textContent);
      
      newElement.appendChild(textNode);
      parentNode.appendChild(newElement);
    } else {
      console.warn("DEV: ERROR: 💀 addContentToElement does not recognize something being provided in the params. Check what you are actually passing to it.")
    }
  }

  // Setup

  function handleDOMContentLoaded() {
    // Code Execution
    for (i = 0; contents.length > i; i++) {
      addContentToElement(contents[i].content, "div", document.getElementById('main'));
    }

    // Clean up y report
    console.log("DEV OK: 👌🏻Content loaded");
    document.removeEventListener("DOMContentLoaded", handleDOMContentLoaded);
  }

  function init() {
    document.addEventListener("DOMContentLoaded", handleDOMContentLoaded);
  }

  // Init

  init();
